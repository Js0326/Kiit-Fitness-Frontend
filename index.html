<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary Meta -->
    <title>KIIT Fitness Center</title>
    <meta name="description" content="Manage your KIIT University gym membership, book slots, track attendance and streaks." />
    <meta name="keywords"    content="KIIT, gym, fitness, membership, booking, attendance" />
    <meta name="author"      content="KIIT University" />
    <meta name="robots"      content="noindex, nofollow" />

    <!-- PWA / Theme -->
    <meta name="theme-color"                  content="#FF6B00" />
    <meta name="mobile-web-app-capable"       content="yes" />
    <meta name="application-name"             content="KIITGym" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable"             content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style"    content="black-translucent" />
    <meta name="apple-mobile-web-app-title"               content="KIITGym" />

    <!-- Microsoft -->
    <meta name="msapplication-TileColor"    content="#FF6B00" />
    <meta name="msapplication-TileImage"    content="/icon-144x144.png" />
    <meta name="msapplication-config"       content="none" />

    <!-- Favicons -->
    <link rel="icon"             type="image/svg+xml"  href="/favicon.svg" />
    <link rel="icon"             type="image/png"      href="/favicon-32x32.png" sizes="32x32" />
    <link rel="icon"             type="image/png"      href="/favicon-16x16.png" sizes="16x16" />
    <link rel="apple-touch-icon"                       href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152"       href="/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144"       href="/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="192x192"       href="/icon-192x192.png" />

    <!-- Apple Splash Screens (iPhone/iPad) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="KIIT Fitness Center" />
    <meta property="og:description" content="Manage your KIIT gym membership, book slots and track attendance." />
    <meta property="og:image"       content="/icon-512x512.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />

    <style>
      /* Prevent flash of white on load */
      html { background: #111111; }
      #root { min-height: 100vh; }

      /* iOS safe area support */
      body {
        padding-bottom: env(safe-area-inset-bottom);
        padding-left:   env(safe-area-inset-left);
        padding-right:  env(safe-area-inset-right);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
